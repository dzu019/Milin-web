<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Shotozakirei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: #eaeaea;
            background-color: #000;
            overflow-x: hidden;
            overflow-y: auto; 
            min-height: 100vh;
        }

        /* --- BACKGROUND VIDEO (DIJAMIN JELAS 100%) --- */
        #video-bg {
            position: fixed; 
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -3; 
            transform: translate(-50%, -50%);
            object-fit: cover;
            /* Filter dihapus agar video asli tampil apa adanya */
        }

        /* Overlay sangat tipis & TANPA BLUR agar video gelap tetap terlihat */
        .glass-overlay {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.35); /* Transparansi dikurangi jadi cuma 35% */
            z-index: -2;
            /* Blur dihilangkan total */
        }

        /* Container Utama */
        .container {
            width: 100%; max-width: 400px;
            margin: 0 auto;
            text-align: center; 
            z-index: 1;
            padding: 80px 20px 100px 20px; 
            position: relative;
        }

        /* --- ANIMASI MASUK --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            opacity: 0; 
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; } 
        .delay-2 { animation-delay: 0.3s; } 
        .delay-3 { animation-delay: 0.5s; } 
        .delay-4 { animation-delay: 0.7s; } 
        .delay-5 { animation-delay: 0.9s; } 

        /* Profil Avatar True Dark Red */
        .avatar {
            width: 110px; height: 110px;
            border-radius: 50%; 
            /* Garis merah sangat gelap */
            border: 2px solid #3a0000; 
            padding: 4px; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 1.7rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            text-shadow: 0 2px 5px #000;
        }

        .username {
            font-size: 0.85rem; 
            color: #6a1a1a; /* Merah marun redup / kalem */
            font-weight: 400; 
            letter-spacing: 3px;
            margin-bottom: 50px; 
            text-transform: uppercase;
        }

        /* --- TOMBOL MASCULINE STEALTH --- */
        .links-container { display: flex; flex-direction: column; gap: 20px; }
        .btn-wrapper { width: 100%; }

        .link-card {
            /* Latar hitam pekat agar menyatu dengan garis putus-putus */
            background: rgba(5, 5, 5, 0.85); 
            border-radius: 6px; 
            
            /* Garis putus-putus Dark Red yang kalem dan menyatu dengan background hitam */
            border: 2px dashed #3a0000; 
            
            padding: 16px 20px; 
            color: #cccccc; 
            text-decoration: none;
            font-weight: 400; 
            letter-spacing: 1.5px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: all 0.4s ease-in-out;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        /* Ikon merah sangat gelap */
        .link-card i { font-size: 1.3rem; color: #4a0000; transition: 0.4s; width: 25px; text-align: center; }

        /* Hover efek: nyala merah marun (bukan merah terang) */
        .link-card:hover {
            background: rgba(20, 0, 0, 0.95);
            border-color: #8b0000; /* Dark red elegan */
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8);
            color: #ffffff;
        }

        .link-card:hover i { color: #8b0000; }

        .footer { 
            margin-top: 80px; 
            font-size: 0.7rem; 
            color: rgba(255, 255, 255, 0.15); /* Abu-abu sangat redup */
            letter-spacing: 4px; 
            text-transform: uppercase;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="bg.mp4" type="video/mp4">
    </video>
    
    <div class="glass-overlay"></div>

    <div class="container">
        <div class="fade-in delay-1">
            <img src="avatar.jpg" alt="Profile" class="avatar">
            <h1>Shotozakirei</h1>
            <div class="username">@shotozakirei</div>
        </div>

        <div class="links-container">
            <div class="btn-wrapper fade-in delay-2">
                <a href="https://open.spotify.com/user/31fr7mfuacdokppwhjcdi3zkzsla?si=2vas8obmST2ssZBLgJE0KA" class="link-card" target="_blank">
                    <i class="fa-brands fa-spotify"></i><span>Spotify</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-3">
                <a href="https://www.instagram.com/m.shotozakirei?igsh=YmJoODdnYzNrcG02" class="link-card" target="_blank">
                    <i class="fa-brands fa-instagram"></i><span>Instagram</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-3">
                <a href="https://tiktok.com/@alonerlonly" class="link-card" target="_blank">
                    <i class="fa-brands fa-tiktok"></i><span>TikTok</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-4">
                <a href="https://f2p.life" class="link-card" target="_blank">
                    <i class="fa-solid fa-globe"></i><span>f2p.life</span>
                </a>
            </div>
        </div>

        <div class="footer fade-in delay-5">MANAGED BY ILMI © 2026</div>
    </div>

</body>
</html>
