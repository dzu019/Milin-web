<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Links | Shotozakirei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        
        /* --- 1. MATIKAN FITUR SCROLL TOTAL --- */
        html, body {
            font-family: 'Inter', sans-serif;
            color: #eaeaea;
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            overscroll-behavior: none;
            position: fixed; 
        }

        /* --- 2. BACKGROUND & LAPISAN --- */
        .fixed-bg-container {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw;
            height: 100vh; 
            z-index: 0; 
        }

        #video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 0, 0, 0.5); 
            z-index: 1; 
        }

        /* --- 3. CONTAINER UTAMA --- */
        .container {
            width: 100%;
            height: 100%;
            max-width: 400px;
            margin: 0 auto;
            text-align: center; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            padding: 20px;
            z-index: 2;
            position: relative;
        }

        /* --- ANIMASI MASUK --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .fade-in { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
        .delay-1 { animation-delay: 0.2s; } 
        .delay-2 { animation-delay: 0.4s; } 
        .delay-3 { animation-delay: 0.6s; } 

        /* Profil */
        .avatar {
            width: 95px; height: 95px;
            border-radius: 50%; 
            border: 2px solid rgba(139, 0, 0, 0.4); 
            padding: 4px; margin: 0 auto 15px auto;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7);
            background: rgba(15, 0, 0, 0.6);
            animation: floatAvatar 4s ease-in-out infinite;
        }

        @keyframes floatAvatar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { font-size: 1.5rem; letter-spacing: 2px; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .username { font-size: 0.75rem; color: #8b2a2a; letter-spacing: 3px; margin-bottom: 35px; text-transform: uppercase; }

        /* --- 4. TOMBOL ESTETIK --- */
        .links-container { 
            display: flex; 
            flex-direction: column; 
            gap: 14px; 
            width: 85%; 
            margin: 0 auto; 
        }

        .link-card {
            background: rgba(25, 0, 0, 0.5); 
            border-radius: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 12px 20px; 
            color: #ffffff; 
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500; 
            letter-spacing: 1px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .link-card i { font-size: 1.1rem; color: #ffffff; width: 20px; text-align: center; }

        .link-card:hover {
            background: rgba(60, 0, 0, 0.7);
            border-color: rgba(139, 0, 0, 0.4); 
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }

        .footer { 
            margin-top: 50px; 
            font-size: 0.6rem; 
            color: rgba(255, 255, 255, 0.2); 
            letter-spacing: 4px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="fixed-bg-container">
        <video autoplay muted loop playsinline id="video-bg">
            <source src="bg.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </div>

    <div class="container">
        
        <div class="fade-in delay-1">
            <img src="avatar.jpg" alt="Profile" class="avatar">
            <h1>Shotozakirei</h1>
            <div class="username">@shotozakirei</div>
        </div>

        <div class="links-container fade-in delay-2">
            <a href="https://open.spotify.com/user/31fr7mfuacdokppwhjcdi3zkzsla?si=2vas8obmST2ssZBLgJE0KA" class="link-card" target="_blank">
                <i class="fa-brands fa-spotify"></i><span>Spotify</span>
            </a>

            <a href="https://www.instagram.com/m.shotozakirei?igsh=YmJoODdnYzNrcG02" class="link-card" target="_blank">
                <i class="fa-brands fa-instagram"></i><span>Instagram</span>
            </a>

            <a href="https://tiktok.com/@alonerlonly" class="link-card" target="_blank">
                <i class="fa-brands fa-tiktok"></i><span>TikTok</span>
            </a>

            </div>

        <div class="footer fade-in delay-3">MANAGED BY ILMI © 2026</div>
    </div>

</body>
</html>
