<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Shotozakirei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: #eaeaea;
            background-color: #000;
            overflow-x: hidden;
            overflow-y: auto; 
            min-height: 100vh;
        }

        /* --- BACKGROUND VIDEO JELAS --- */
        #video-bg {
            position: fixed; 
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -3; 
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Overlay tipis tanpa blur agar video jelas */
        .glass-overlay {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(5, 0, 0, 0.4); /* Transparansi pas, ada sentuhan merah super gelap */
            z-index: -2;
        }

        /* Container Utama */
        .container {
            width: 100%; max-width: 400px;
            margin: 0 auto;
            text-align: center; 
            z-index: 1;
            padding: 80px 20px 100px 20px; 
            position: relative;
        }

        /* --- ANIMASI MASUK --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            opacity: 0; 
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .delay-1 { animation-delay: 0.1s; } 
        .delay-2 { animation-delay: 0.3s; } 
        .delay-3 { animation-delay: 0.5s; } 
        .delay-4 { animation-delay: 0.7s; } 
        .delay-5 { animation-delay: 0.9s; } 

        /* --- PROFIL AVATAR (ANIMASI NAIK TURUN) --- */
        .avatar {
            width: 110px; height: 110px;
            border-radius: 50%; 
            border: 2px solid rgba(139, 0, 0, 0.3); /* Garis solid halus merah gelap */
            padding: 4px; margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            background: rgba(10, 0, 0, 0.7);
            
            /* Animasi naik-turun (floating) */
            animation: floatAvatar 4s ease-in-out infinite;
        }

        @keyframes floatAvatar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); } /* Bergerak naik 12 pixel */
        }

        h1 {
            font-size: 1.7rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
            font-weight: 600;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        .username {
            font-size: 0.85rem; 
            color: #8b2a2a; /* Merah kalem */
            font-weight: 500; 
            letter-spacing: 3px;
            margin-bottom: 50px; 
            text-transform: uppercase;
        }

        /* --- TOMBOL (HITAM PEKAT + SEMBURAT MERAH) --- */
        .links-container { display: flex; flex-direction: column; gap: 18px; }
        .btn-wrapper { width: 100%; }

        .link-card {
            /* Gradasi gelap hampir hitam, ada hint merah di ujung */
            background: linear-gradient(145deg, rgba(15, 5, 5, 0.9), rgba(5, 0, 0, 0.95)); 
            border-radius: 12px; /* Sudut melengkung halus, nggak aneh */
            border: 1px solid rgba(139, 0, 0, 0.15); /* Garis batas tipis biar rapi */
            
            padding: 16px 20px; 
            color: #d1d1d1; 
            text-decoration: none;
            font-weight: 500; 
            letter-spacing: 1.5px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
        }

        .link-card i { font-size: 1.3rem; color: #8b2a2a; transition: 0.3s; width: 25px; text-align: center; }

        /* Hover efek: Warna merahnya sedikit lebih hidup saat disentuh */
        .link-card:hover {
            background: linear-gradient(145deg, rgba(35, 10, 10, 0.95), rgba(15, 0, 0, 1));
            border-color: rgba(139, 0, 0, 0.4); 
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(139, 0, 0, 0.2);
            color: #ffffff;
        }

        .link-card:hover i { color: #ffffff; }

        .footer { 
            margin-top: 80px; 
            font-size: 0.7rem; 
            color: rgba(255, 255, 255, 0.2); 
            letter-spacing: 4px; 
            text-transform: uppercase;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="glass-overlay"></div>

    <div class="container">
        <div class="fade-in delay-1">
            <img src="avatar.jpg" alt="Profile" class="avatar">
            <h1>Shotozakirei</h1>
            <div class="username">@shotozakirei</div>
        </div>

        <div class="links-container">
            <div class="btn-wrapper fade-in delay-2">
                <a href="https://open.spotify.com/user/31fr7mfuacdokppwhjcdi3zkzsla?si=2vas8obmST2ssZBLgJE0KA" class="link-card" target="_blank">
                    <i class="fa-brands fa-spotify"></i><span>Spotify</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-3">
                <a href="https://www.instagram.com/m.shotozakirei?igsh=YmJoODdnYzNrcG02" class="link-card" target="_blank">
                    <i class="fa-brands fa-instagram"></i><span>Instagram</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-3">
                <a href="https://tiktok.com/@alonerlonly" class="link-card" target="_blank">
                    <i class="fa-brands fa-tiktok"></i><span>TikTok</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-4">
                <a href="https://f2p.life" class="link-card" target="_blank">
                    <i class="fa-solid fa-globe"></i><span>f2p.life</span>
                </a>
            </div>
        </div>

        <div class="footer fade-in delay-5">MANAGED BY ILMI © 2026</div>
    </div>

</body>
</html>
