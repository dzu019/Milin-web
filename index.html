<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Shotozakirei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: #eaeaea;
            background-color: #050505;
            overflow-x: hidden;
            overflow-y: auto; 
            min-height: 100vh;
        }

        /* --- BACKGROUND VIDEO DENGAN EFEK KALEM --- */
        #video-bg {
            position: fixed; 
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -3; 
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        /* Overlay gelap & blur tipis biar sinematik */
        .glass-overlay {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.75); /* Hitam transparan kalem */
            backdrop-filter: blur(4px); /* Efek buram yang estetik */
            z-index: -2;
        }

        /* Container Utama */
        .container {
            width: 100%; max-width: 400px;
            margin: 0 auto;
            text-align: center; 
            z-index: 1;
            padding: 80px 20px 100px 20px; 
            position: relative;
        }

        /* --- ANIMASI MASUK (ENTRY ANIMATION) --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            opacity: 0; /* Mulai dari tidak terlihat */
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* --- ANIMASI PULSING GLOW UNTUK AVATAR (PREMIUM) --- */
        @keyframes avatarPulseGlow {
            0% { 
                border-color: rgba(255, 255, 255, 0.1); 
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            }
            100% { 
                border-color: rgba(255, 255, 255, 0.3); /* Sedikit lebih terang */
                box-shadow: 0 0 40px rgba(255, 255, 255, 0.15); /* Glowredup */
            }
        }

        /* Delay agar munculnya bergantian (Sekarang di kotak profil) */
        .delay-1 { animation-delay: 0.1s; } /* Kotak Profil */
        .delay-2 { animation-delay: 0.6s; } /* Spotify */
        .delay-3 { animation-delay: 0.8s; } /* Instagram */
        .delay-4 { animation-delay: 1.0s; } /* TikTok & F2P */
        .delay-5 { animation-delay: 1.2s; } /* Footer */

        /* Kotak Profil (Staggered Entrance) */
        .profile-section {
            display: flex; flex-direction: column; align-items: center; margin-bottom: 50px;
        }

        .avatar {
            width: 110px; height: 110px;
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.1); /* Garis abu-abu tipis awal */
            padding: 4px; margin-bottom: 20px;
            background: rgba(20, 20, 20, 0.5);
            /* Animasi berdenyut default (Subtle) */
            animation: avatarPulseGlow 3s ease-in-out infinite alternate;
        }

        /* Muncul bergantian di dalam profil */
        .profile-item {
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        
        .p-avatar { animation-delay: 0.1s; }
        .p-name { animation-delay: 0.2s; }
        .p-username { animation-delay: 0.3s; }

        h1 {
            font-size: 1.7rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .username {
            font-size: 0.85rem; 
            color: #888888; /* Abu-abu kalem */
            font-weight: 400; 
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* --- TOMBOL MASCULINE STEALTH --- */
        .links-container { display: flex; flex-direction: column; gap: 18px; }
        .btn-wrapper { width: 100%; }

        .link-card {
            background: rgba(25, 25, 25, 0.5); /* Hitam transparan elegan */
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.05); /* Garis nyaris tak terlihat */
            padding: 16px 20px; 
            color: #cccccc; 
            text-decoration: none;
            font-weight: 400; 
            letter-spacing: 1.5px;
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: all 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Ikon abu-abu kalem */
        .link-card i { font-size: 1.3rem; color: #888888; transition: 0.4s; width: 25px; text-align: center; }

        /* Hover efek: nyala putih redup, sangat elegan */
        .link-card:hover {
            background: rgba(45, 45, 45, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            color: #ffffff;
        }

        .link-card:hover i { color: #ffffff; }

        .footer { 
            margin-top: 80px; 
            font-size: 0.7rem; 
            color: rgba(255, 255, 255, 0.2); 
            letter-spacing: 4px; 
            text-transform: uppercase;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="glass-overlay"></div>

    <div class="container">
        <div class="profile-section">
            <div class="profile-item p-avatar">
                <img src="avatar.jpg" alt="Profile" class="avatar">
            </div>
            <div class="profile-item p-name">
                <h1>Shotozakirei</h1>
            </div>
            <div class="profile-item p-username">
                <div class="username">@shotozakirei</div>
            </div>
        </div>

        <div class="links-container">
            <div class="btn-wrapper fade-in delay-2">
                <a href="https://open.spotify.com/user/31fr7mfuacdokppwhjcdi3zkzsla?si=2vas8obmST2ssZBLgJE0KA" class="link-card" target="_blank">
                    <i class="fa-brands fa-spotify"></i><span>Spotify</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-3">
                <a href="https://www.instagram.com/m.shotozakirei?igsh=YmJoODdnYzNrcG02" class="link-card" target="_blank">
                    <i class="fa-brands fa-instagram"></i><span>Instagram</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-3">
                <a href="https://tiktok.com/@alonerlonly" class="link-card" target="_blank">
                    <i class="fa-brands fa-tiktok"></i><span>TikTok</span>
                </a>
            </div>

            <div class="btn-wrapper fade-in delay-4">
                <a href="https://f2p.life" class="link-card" target="_blank">
                    <i class="fa-solid fa-globe"></i><span>f2p.life</span>
                </a>
            </div>
        </div>

        <div class="footer fade-in delay-5">MANAGED BY ILMI © 2026</div>
    </div>

</body>
</html>
