<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links | Shotozakirei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Dasar & Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: white;
            background-color: #000; /* Hitam mutlak untuk fallback */
            overflow-x: hidden;
            overflow-y: auto; 
            min-height: 100vh;
        }

        /* --- BACKGROUND VIDEO (FULL VISIBILITY) --- */
        #video-bg {
            position: fixed; 
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -3; 
            transform: translate(-50%, -50%);
            object-fit: cover;
            /* Pastikan video tidak terlalu kontras agar teks kebaca */
            filter: brightness(0.8) contrast(1.1); 
        }

        /* overlay VIGNETTE (Terang di tengah, gelap di pinggir) */
        .vignette-overlay {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Lighter in center, darker on edges for masculine depth */
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 80%, rgba(0,0,0,0.9) 100%);
            z-index: -2;
        }

        /* Lapisan tipis blur biar video gak terlalu tajam (opsional) */
        .blur-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            backdrop-filter: blur(2px); z-index: -1;
        }

        /* Container Utama */
        .container {
            width: 100%; max-width: 400px;
            margin: 0 auto;
            text-align: center; 
            z-index: 1;
            padding: 80px 20px 100px 20px; 
            position: relative;
        }

        /* Profil Avatar Maskulin */
        .avatar {
            width: 115px; height: 115px;
            border-radius: 50%; 
            border: 3px solid #8B0000; /* Deep Crimson */
            padding: 5px; margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.7);
            animation: float 4s ease-in-out infinite;
            background: rgba(0,0,0,0.5); /* Latar belakang tipis buat avatar */
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }

        h1 {
            font-size: 1.9rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ffffff;
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .username {
            font-size: 0.95rem; 
            color: #ff4d4d; /* Bright Red */
            font-weight: 600; 
            letter-spacing: 3px;
            margin-bottom: 60px; 
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.6);
        }

        /* --- TOMBOL PREMIUM MASCULINE (PRO GLOW) --- */
        .links-container { display: flex; flex-direction: column; gap: 22px; }
        .btn-wrapper { position: relative; width: 100%; }

        .link-card {
            background: linear-gradient(135deg, rgba(30, 30, 30, 0.7) 0%, rgba(15, 15, 15, 0.8) 100%); /* Steel/Graphite transparan */
            border-radius: 8px; /* Lebih kotak sedikit biar maskulin */
            /* Garis solid dengan glow berdenyut */
            border: 1px solid #8B0000;
            padding: 18px 25px; 
            color: #e0e0e0; 
            text-decoration: none;
            font-weight: 600; 
            letter-spacing: 2px;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; gap: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            /* Memulai animasi denyut default */
            animation: pulseGlow 3s infinite alternate;
        }

        /* Ikon seragam merah marun */
        .link-card i { font-size: 1.4rem; color: #8B0000; transition: 0.3s; width: 25px; text-align: center; }

        /* Hover efek menyala merah terang */
        .btn-wrapper:hover .link-card {
            background: linear-gradient(135deg, rgba(50, 10, 10, 0.8) 0%, rgba(30, 5, 5, 0.9) 100%);
            border-color: #ff3333;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 51, 51, 0.4);
            color: #ffffff;
            animation: none; /* Matikan denyut default saat hover */
        }

        .btn-wrapper:hover .link-card i { color: #ffffff; transform: scale(1.1); }

        /* Animasi Pulsing Glow pelan */
        @keyframes pulseGlow {
            0% { border-color: #8B0000; box-shadow: 0 0 10px rgba(139, 0, 0, 0.3); }
            100% { border-color: #ff3333; box-shadow: 0 0 20px rgba(255, 51, 51, 0.5); }
        }

        .footer { 
            margin-top: 80px; 
            font-size: 0.75rem; 
            color: rgba(255, 77, 77, 0.5); 
            letter-spacing: 4px; 
            text-transform: uppercase;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="vignette-overlay"></div>
    <div class="blur-layer"></div>

    <div class="container">
        <img src="avatar.jpg" alt="Profile" class="avatar">
        <h1>Shotozakirei</h1>
        <div class="username">@shotozakirei</div>

        <div class="links-container">
            <div class="btn-wrapper">
                <a href="https://open.spotify.com/user/31fr7mfuacdokppwhjcdi3zkzsla?si=2vas8obmST2ssZBLgJE0KA" class="link-card" target="_blank">
                    <i class="fa-brands fa-spotify"></i><span>Spotify</span>
                </a>
            </div>

            <div class="btn-wrapper">
                <a href="https://www.instagram.com/m.shotozakirei?igsh=YmJoODdnYzNrcG02" class="link-card" target="_blank">
                    <i class="fa-brands fa-instagram"></i><span>Instagram</span>
                </a>
            </div>

            <div class="btn-wrapper">
                <a href="https://tiktok.com/@alonerlonly" class="link-card" target="_blank">
                    <i class="fa-brands fa-tiktok"></i><span>TikTok</span>
                </a>
            </div>

            <div class="btn-wrapper">
                <a href="https://f2p.life" class="link-card" target="_blank">
                    <i class="fa-solid fa-globe"></i><span>f2p.life</span>
                </a>
            </div>
        </div>

        <div class="footer">MANAGED BY ILMI © 2026</div>
    </div>

</body>
</html>
