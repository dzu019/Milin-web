<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Links | Shotozakirei</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: #eaeaea;
            background-color: #000;
            /* --- LOCK SCROLL --- */
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed; 
        }

        #video-bg {
            position: fixed; 
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            z-index: -3; 
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .glass-overlay {
            position: fixed; 
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.35); 
            z-index: -2;
        }

        .container {
            width: 100%; max-width: 400px;
            height: 100vh; /* Full layar */
            margin: 0 auto;
            text-align: center; 
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Konten otomatis di tengah layar */
            padding: 20px;
            position: relative;
        }

        /* --- ANIMASI --- */
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .fade-in { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .delay-1 { animation-delay: 0.1s; } 
        .delay-2 { animation-delay: 0.3s; } 
        .delay-3 { animation-delay: 0.5s; } 
        .delay-4 { animation-delay: 0.7s; } 

        /* Avatar Floating */
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%; 
            border: 2px solid rgba(139, 0, 0, 0.4); 
            padding: 4px; margin: 0 auto 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
            background: rgba(10, 0, 0, 0.5);
            animation: floatAvatar 4s ease-in-out infinite;
        }
        @keyframes floatAvatar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { font-size: 1.6rem; letter-spacing: 2px; color: #fff; text-transform: uppercase; }
        .username { font-size: 0.8rem; color: #8b2a2a; letter-spacing: 3px; margin-bottom: 40px; text-transform: uppercase; }

        /* Tombol Transparan */
        .links-container { display: flex; flex-direction: column; gap: 15px; }
        .link-card {
            background: rgba(20, 0, 0, 0.45); 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 14px 20px; 
            color: #fff; 
            text-decoration: none;
            font-weight: 500; 
            letter-spacing: 1.5px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .link-card i { font-size: 1.2rem; color: #fff; }
        .link-card:hover { background: rgba(60, 0, 0, 0.6); transform: translateY(-3px); }

        .footer { margin-top: 50px; font-size: 0.6rem; color: rgba(255,255,255,0.2); letter-spacing: 3px; }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline id="video-bg">
        <source src="bg.mp4" type="video/mp4">
    </video>
    <div class="glass-overlay"></div>

    <div class="container">
        <div class="fade-in delay-1">
            <img src="avatar.jpg" alt="Profile" class="avatar">
            <h1>Shotozakirei</h1>
            <div class="username">@shotozakirei</div>
        </div>

        <div class="links-container">
            <div class="btn-wrapper fade-in delay-2">
                <a href="https://open.spotify.com/user/31fr7mfuacdokppwhjcdi3zkzsla?si=2vas8obmST2ssZBLgJE0KA" class="link-card" target="_blank">
                    <i class="fa-brands fa-spotify"></i><span>Spotify</span>
                </a>
            </div>
            <div class="btn-wrapper fade-in delay-3">
                <a href="https://www.instagram.com/m.shotozakirei?igsh=YmJoODdnYzNrcG02" class="link-card" target="_blank">
                    <i class="fa-brands fa-instagram"></i><span>Instagram</span>
                </a>
            </div>
            <div class="btn-wrapper fade-in delay-3">
                <a href="https://tiktok.com/@alonerlonly" class="link-card" target="_blank">
                    <i class="fa-brands fa-tiktok"></i><span>TikTok</span>
                </a>
            </div>
            <div class="btn-wrapper fade-in delay-4">
                <a href="https://f2p.life" class="link-card" target="_blank">
                    <i class="fa-solid fa-globe"></i><span>f2p.life</span>
                </a>
            </div>
        </div>

        <div class="footer fade-in delay-4">MANAGED BY ILMI © 2026</div>
    </div>

</body>
</html>
